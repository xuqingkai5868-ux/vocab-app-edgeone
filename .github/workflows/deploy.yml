name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm install -g edgeone@latest

      - run: npx edgeone makers deploy -n vocab-app-edgeone --site global -t "${{ secrets.EDGEONE_TOKEN }}"
        env:
          PAGES_SOURCE: github-actions
